site_name: Shareable, Structured, Semantic Model (S3Model)
copyright: 'Copyright 2009 - 2023 Timothy W. Cook - All Rights Reserved.'
theme:
    name: material
    language: en
    features:
      - navigation.instant
      - navigation.tracking
      - navigation.tabs
      - navigation.tabs.sticky
      - navigation.top
      - navigation.footer
      - toc.follow
    logo: images/SmallLogo.png
    favicon: images/favicon.ico
    palette:

    # Palette toggle for light mode
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode


      font:
        text: Ubuntu Regular 400
    highlightjs: true
    hljs_languages:
        - yaml
    

nav:
    - Home: 'index.md'
    - Specifications: 'specifications/specs.md'
    - XML Schema: 'xsd/rm.md'
    - Tools: 'tools/tools.md'
    - Contributing: 'Contributing.md'
    - Support: 'support.md'
    - Glossary: 'glossary.md'
    - License: 'LICENSE.md'

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  social:
    - icon: fontawesome/brands/twitter 
      link: https://twitter.com/S3Model
    - icon: fontawesome/brands/github 
      link: https://github.com/twcook
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/groups/4756750/
    - icon: fontawesome/solid/paper-plane
      link: mailto:s3modeldata@gmail.com
  consent:
    title: Cookie consent
    description: >- 


      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
            
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html